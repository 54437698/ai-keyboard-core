name: Generate Pro Wrapper
on: workflow_dispatch 

jobs:
  setup-wrapper:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # CRITICAL: This allows GitHub to save the files back to your repo
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate Wrapper Files
        run: |
          # We pass a fake build number just to satisfy the Android Gradle Plugin check
          gradle wrapper --gradle-version 8.5 -PbuildNumber=1
          chmod +x gradlew

      - name: Commit Wrapper to Repo
        run: |
          git config --global user.name "Joint Venture Guardian"
          git config --global user.email "guardian@jv.ai"
          # This adds the script AND the internal engine files
          git add gradlew gradlew.bat gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties
          git commit -m "Admin: Injected Pro Gradle Wrapper [Fail-Safe Active]"
          git push
