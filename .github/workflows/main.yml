name: Build Sovereign Alpha

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This lets you start it manually!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch AI Model from Release
        uses: dsaltares/fetch-gh-release-asset@master
        with:
          version: 'tags/v0.0-assets'
          file: 'smollm2_135m_int8.bin'
          target: 'app/src/main/assets/models/model.bin'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew assembleDebug
