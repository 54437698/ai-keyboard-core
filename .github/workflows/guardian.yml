name: Sovereign Guardian Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download ExecuTorch Llama Model
        run: |
          mkdir -p app/src/main/assets/models/
          # Download the actual ExecuTorch model (.pte)
          curl -L "https://pub-2fdef7a2969f432896661a396e749bc3.r2.dev/llama_v3_2_1b_q8.pte" -o app/src/main/assets/models/model.pte
          # Download the required tokenizer
          curl -L "https://pub-2fdef7a2969f432896661a396e749bc3.r2.dev/tokenizer.bin" -o app/src/main/assets/models/tokenizer.bin

      - name: Sovereign Guard: Verify Model Integrity
        run: |
          # If the file is smaller than 100MB, it's a failed download (R2 error page)
          FILESIZE=$(stat -c%s "app/src/main/assets/models/model.pte")
          echo "Model size is $FILESIZE bytes"
          if [ "$FILESIZE" -lt 100000000 ]; then
            echo "CRITICAL ERROR: Model download failed (16KB Trap). Check R2 link or Bucket permissions."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          chmod +x gradlew
          # Added clean to ensure the cache error from your logs is wiped out
          ./gradlew clean assembleDebug --stacktrace -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Keyboard-Alpha
          path: app/build/outputs/apk/debug/app-debug.apk
