name: Joint Venture Guardian

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # <--- This MUST be 21 to solve the Version 65 error

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Setup Gradle (Auto-Ignition)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: Validate JSON Layout
        run: |
          # Note: Ensure the path matches your repo (you moved it to assets earlier)
          cat src/main/assets/master_layout.json | python3 -m json.tool > /dev/null
          echo "✅ UI Layout is surgical."

      - name: Build NPU Core & Assemble APK
        run: |
          # Ensure execution permissions and build
          gradle assembleDebug --stacktrace
          echo "✅ Silicon Brain and Android Identity are synced. APK Generated."

      - name: Upload Sovereign APK
        uses: actions/upload-artifact@v4
        with:
          name: JV-Keyboard-Alpha
          # We use a wildcard here so it finds the APK even if paths shift slightly
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 5
