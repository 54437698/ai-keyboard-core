name: Joint Venture Guardian

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Setup Gradle (Auto-Ignition)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: Validate JSON Layout
        run: |
          cat ui/master_layout.json | python3 -m json.tool > /dev/null
          echo "✅ UI Layout is surgical."

      - name: Build NPU Core
        run: |
          # Use the 'gradle' command installed by the setup step above
          gradle compileDebugJavaWithJavac
          echo "✅ Silicon Brain and Android Identity are synced."
