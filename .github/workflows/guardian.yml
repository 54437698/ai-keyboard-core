name: Joint Venture Guardian

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Validate JSON Layout
        run: |
          cat ui/master_layout.json | python3 -m json.tool > /dev/null
          echo "✅ UI Layout is surgical."

      - name: Validate C++ Core (Surgical Build)
        run: |
          chmod +x gradlew
          ./gradlew compileDebugJavaWithJavac
          echo "✅ C++ Core and JNI Bridge are surgical."

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
