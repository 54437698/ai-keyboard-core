name: Joint Venture Guardian

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Validate JSON Layout
        run: |
          cat ui/master_layout.json | python3 -m json.tool > /dev/null
          echo "✅ UI Layout is surgical."

      - name: Validate C++ Core (NDK Clang Check)
        run: |
          # Direct NDK compilation check - no gradlew required
          $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang++ \
            -target aarch64-linux-android24 \
            -isystem $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include \
            -isystem $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/android \
            -fsyntax-only core/npu_pipeline.cpp core/inference_bridge.cpp
          echo "✅ NPU Logic and JNI Bridge are verified by NDK."
