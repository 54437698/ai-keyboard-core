name: Joint Venture Guardian

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Setup Gradle (Auto-Ignition)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: Validate JSON Layout
        run: |
          cat src/main/assets/master_layout.json | python3 -m json.tool > /dev/null
          echo "✅ UI Layout is surgical."

      - name: Build Alpha v1.1.${{ github.run_number }}
        run: |
          # 1. Give the script permission to run
          chmod +x gradlew
          
          # 2. Run the Pro Build using the Wrapper we just injected
          ./gradlew assembleDebug -PbuildNumber=${{ github.run_number }} --stacktrace
          
          echo "✅ Sovereign Alpha Build #158 is forging..."
      - name: Upload Sovereign Alpha APK
        uses: actions/upload-artifact@v4
        with:
          name: JV-Keyboard-Alpha-v1.1.${{ github.run_number }}
          # REMOVE the quotes and use the double-star hunt 🏹
          path: app/build/outputs/apk/**/*.apk
          # The "Bollocks Alarm" - if it doesn't find the 20MB, the build FAILS
          if-no-files-found: error
          retention-days: 7
