name: Sovereign Guardian Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download ExecuTorch Llama Model
        run: |
          mkdir -p app/src/main/assets/models/
          # Download the 8-bit quantized model (approx 800MB - fast & mobile friendly)
          curl -L "https://huggingface.co/software-mansion/react-native-executorch-llama-3.2/resolve/main/llama-3.2-1B/llama3_2_1b_q4_0.pte" -o app/src/main/assets/models/model.pte
          
          # Download the tokenizer
          curl -L "https://huggingface.co/software-mansion/react-native-executorch-llama-3.2/resolve/main/tokenizer.bin" -o app/src/main/assets/models/tokenizer.bin

      - name: Sovereign Guard
        run: |
          FILESIZE=$(stat -c%s "app/src/main/assets/models/model.pte")
          echo "Model size is $FILESIZE bytes"
          # This time, we expect ~800MB. If it's less than 100MB, it's still failing.
          if [ $FILESIZE -lt 100000000 ]; then
            echo "ERROR: Model download failed again. Link might be restricted."
            exit 1
          fi

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace -Dorg.gradle.jvmargs=-Xmx4g

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Sovereign-Keyboard-Alpha
          path: app/build/outputs/apk/debug/app-debug.apk
