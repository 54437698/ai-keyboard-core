name: Joint Venture Guardian

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Setup Gradle (Auto-Ignition)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.5"

      - name: Validate JSON Layout
        run: |
          cat src/main/assets/master_layout.json | python3 -m json.tool > /dev/null
          echo "✅ UI Layout is surgical."

      - name: Build Alpha v1.1.${{ github.run_number }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug -PbuildNumber=${{ github.run_number }} --stacktrace
          echo "✅ Sovereign Alpha Build #158 is forging..."

      - name: Upload Sovereign Alpha APK
        uses: actions/upload-artifact@v4
        with:
          name: JV-Keyboard-Alpha-v1.1.${{ github.run_number }}
          # This searches EVERYWHERE for the APK - No more "No files found"
          path: "**/*.apk"
          # This forces an error if the APK didn't actually build
          if-no-files-found: error
          retention-days: 7
