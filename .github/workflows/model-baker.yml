name: 🧠 Final Llama 4096 Baker (Space Optimized)

on:
  workflow_dispatch:

jobs:
  bake:
    runs-on: ubuntu-latest
    steps: # <--- This is Line 15
      - name: Checkout Code # <--- This is Line 16. It MUST start with a dash and a space.
        uses: actions/checkout@v4

      - name: Maximize Disk & RAM
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 10240 
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Set Up Workspace Environment
        run: |
          mkdir -p $GITHUB_WORKSPACE/tmp_space/pip_cache
          mkdir -p $GITHUB_WORKSPACE/tmp_space/hf_home
          echo "TMPDIR=$GITHUB_WORKSPACE/tmp_space" >> $GITHUB_ENV
          echo "PIP_CACHE_DIR=$GITHUB_WORKSPACE/tmp_space/pip_cache" >> $GITHUB_ENV
          echo "HF_HOME=$GITHUB_WORKSPACE/tmp_space/hf_home" >> $GITHUB_ENV
          echo "PYTHONUNBUFFERED=1" >> $GITHUB_ENV
          python3 -m venv $GITHUB_WORKSPACE/venv
          echo "$GITHUB_WORKSPACE/venv/bin" >> $GITHUB_PATH

      - name: Install Tools
        run: |
          source $GITHUB_WORKSPACE/venv/bin/activate
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir torchao executorch llama-models huggingface_hub

      - name: Bake & Cleanup
        env:
          HF_TOKEN: ${{ secrets.Hugging_API }} 
        run: |
          source $GITHUB_WORKSPACE/venv/bin/activate
          huggingface-cli download meta-llama/Llama-3.2-1B-Instruct --token $HF_TOKEN --local-dir $GITHUB_WORKSPACE/model_raw
          python -m executorch.examples.models.llama.export_llama \
            --checkpoint $GITHUB_WORKSPACE/model_raw/model.safetensors \
            --params $GITHUB_WORKSPACE/model_raw/config.json \
            --max_seq_length 4096 \
            --quantize_kv_cache int4 \
            --output_name llama_brain_4096.pte
          rm -rf $GITHUB_WORKSPACE/model_raw
          rm -rf $GITHUB_WORKSPACE/tmp_space/hf_home

      - name: Upload Final Brain
        uses: actions/upload-artifact@v4
        with:
          name: Llama-4096-PTE
          path: llama_brain_4096.pte
          retention-days: 1
