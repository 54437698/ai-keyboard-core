name: 🧠 Llama 4096 Brain Baker

on:
  workflow_dispatch:

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize Disk & RAM
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 10240 
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true' # Added this for extra space
          remove-docker-images: 'true' # Added this for extra space

      - name: Install AI Tools (CPU Only)
        run: |
          # Create a temp folder on the big 21GB drive
          mkdir -p ./.pip_tmp
          # Force pip to use the big drive for caching and temp files
          export TMPDIR=$GITHUB_WORKSPACE/.pip_tmp
          
          pip install --cache-dir ./.pip_cache torch --index-url https://download.pytorch.org/whl/cpu
          pip install --cache-dir ./.pip_cache torchao executorch llama-models huggingface_hub

      - name: Bake the 4096-Token Brain
        env:
          HF_TOKEN: ${{ secrets.Hugging_API }} 
        run: |
          export TMPDIR=$GITHUB_WORKSPACE/.pip_tmp
          
          # 1. Download
          huggingface-cli download meta-llama/Llama-3.2-1B-Instruct --token $HF_TOKEN --local-dir model_dir
          
          # 2. Export
          python -m executorch.examples.models.llama.export_llama \
            --checkpoint model_dir/model.safetensors \
            --params model_dir/config.json \
            --max_seq_length 4096 \
            --quantize_kv_cache int4 \
            --output_name llama_brain_4096.pte

          # 3. Cleanup
          rm -rf model_dir ./.pip_tmp ./.pip_cache

      - name: Upload Final Brain
        uses: actions/upload-artifact@v4
        with:
          name: Llama-4096-PTE
          path: llama_brain_4096.pte
