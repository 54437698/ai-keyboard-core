name: 🧠 Llama 4096 Brain Baker

on:
  workflow_dispatch: # This puts the "Run" button in your Actions tab

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install AI Tools
        run: |
          pip install torch torchao executorch llama-models huggingface_hub

      - name: Bake the 4096-Token Brain
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Login to Hugging Face
          huggingface-cli login --token $HF_TOKEN
          
          # 2. Download Llama 3.2 1B (The Instruct version for smarter typing)
          huggingface-cli download meta-llama/Llama-3.2-1B-Instruct --local-dir model_dir
          
          # 3. Export to .pte with 4096 context + 4-bit battery saver
          python -m executorch.extension.llm.export.export_llm \
            --checkpoint model_dir/model.safetensors \
            --params model_dir/config.json \
            --max_seq_length 4096 \
            --quantize_kv_cache int4 \
            --output_name llama_brain_4096.pte

      - name: Upload Final Brain
        uses: actions/upload-artifact@v4
        with:
          name: baked-llama-brain
          path: llama_brain_4096.pte
