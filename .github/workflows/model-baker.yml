name: 🧠 Llama 4096 Baker (The One-Step Fix)

on:
  workflow_dispatch:

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize Space
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 10240 
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: Install & Bake (All-In-One)
        env:
          HF_TOKEN: ${{ secrets.Hugging_API }} 
        run: |
          # 1. Setup Environment
          python3 -m venv venv
          source venv/bin/activate
          
          # 2. Install Tools (Single layer to prevent loss)
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir torchao executorch llama-models huggingface_hub
          
          # 3. Download Model
          huggingface-cli download meta-llama/Llama-3.2-1B-Instruct --token $HF_TOKEN --local-dir model_raw
          
          # 4. Bake the Brain
          python -m executorch.examples.models.llama.export_llama \
            --checkpoint model_raw/model.safetensors \
            --params model_raw/config.json \
            --max_seq_length 4096 \
            --quantize_kv_cache int4 \
            --output_name llama_brain_4096.pte
          
          # 5. Cleanup raw files before finishing
          rm -rf model_raw

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Llama-4096-PTE
          path: llama_brain_4096.pte
