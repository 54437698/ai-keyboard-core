name: 🧠 Llama 4096 Brain Baker

on:
  workflow_dispatch:

jobs:
  bake:
    # Using standard runner to stay within your 3,000 free Pro minutes
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize Disk & RAM
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 10240 
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Relocate Python & Install Tools
        run: |
          # 1. Create the Virtual Env on the BIG 21GB drive
          python3 -m venv $GITHUB_WORKSPACE/venv
          
          # 2. Activate it (All 'pip install' commands now stay on the big drive)
          source $GITHUB_WORKSPACE/venv/bin/activate
          
          # 3. Use the big drive for pip's temporary download "gumph"
          mkdir -p $GITHUB_WORKSPACE/pip_tmp
          export TMPDIR=$GITHUB_WORKSPACE/pip_tmp
          
          # 4. Install tools (CPU versions only to save space)
          pip install --cache-dir $GITHUB_WORKSPACE/pip_cache torch --index-url https://download.pytorch.org/whl/cpu
          pip install --cache-dir $GITHUB_WORKSPACE/pip_cache torchao executorch llama-models huggingface_hub

      - name: Bake the 4096-Token Brain
        env:
          HF_TOKEN: ${{ secrets.Hugging_API }} 
        run: |
          # 1. Activate the environment again
          source $GITHUB_WORKSPACE/venv/bin/activate
          
          # 2. MANUALLY add the venv to the Path so it finds 'huggingface-cli'
          export PATH=$GITHUB_WORKSPACE/venv/bin:$PATH
          export TMPDIR=$GITHUB_WORKSPACE/pip_tmp
          
          # 3. Now it will find the command!
          huggingface-cli download meta-llama/Llama-3.2-1B-Instruct --token $HF_TOKEN --local-dir model_dir
          
          # 4. Export
          python -m executorch.examples.models.llama.export_llama \
            --checkpoint model_dir/model.safetensors \
            --params model_dir/config.json \
            --max_seq_length 4096 \
            --quantize_kv_cache int4 \
            --output_name llama_brain_4096.pte

          # 5. Cleanup
          rm -rf model_dir $GITHUB_WORKSPACE/pip_cache

      - name: Upload Final Brain
        uses: actions/upload-artifact@v4
        with:
          name: Llama-4096-PTE
          path: llama_brain_4096.pte
