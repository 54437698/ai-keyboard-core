name: Llama-4096-Baker-FUTO
on:
  workflow_dispatch:

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Maximize Space
        uses: easimon/maximize-build-space@v10
        with:
          swap-size-mb: 10240 
          remove-dotnet: 'true'
          remove-android: 'true'
          root-reserve-mb: 512

      - name: Install & Bake (FUTO Strategy)
        env:
          HF_TOKEN: ${{ secrets.Hugging_API }} 
        run: |
          # Force all temp data to the large partition
          export TMPDIR=$GITHUB_WORKSPACE/tmp_build
          export PIP_CACHE_DIR=$GITHUB_WORKSPACE/pip_cache
          mkdir -p $TMPDIR
          mkdir -p $PIP_CACHE_DIR

          # Setup Environment
          python3 -m venv venv
          source venv/bin/activate
          
          # Install Tools
          pip install --cache-dir $PIP_CACHE_DIR torch --index-url https://download.pytorch.org/whl/cpu
          pip install --cache-dir $PIP_CACHE_DIR torchao executorch llama-models huggingface_hub
          
          # Download Model
          huggingface-cli download meta-llama/Llama-3.2-1B-Instruct --token $HF_TOKEN --local-dir model_raw
          
          # Bake the Brain
          python -m executorch.examples.models.llama.export_llama \
            --checkpoint model_raw/model.safetensors \
            --params model_raw/config.json \
            --max_seq_length 4096 \
            --quantize_kv_cache int4 \
            --output_name llama_brain_4096.pte
          
          # Cleanup
          rm -rf model_raw
          rm -rf $PIP_CACHE_DIR

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Llama-4096-PTE
          path: llama_brain_4096.pte
