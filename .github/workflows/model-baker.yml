name: 🧠 Llama 4096 Brain Baker

on:
  workflow_dispatch:

jobs:
  bake:
    # Pro Tip: Using a larger runner with more RAM (8-core/32GB)
    # This prevents the memory-heavy 4096-context export from crashing.
    runs-on: ubuntu-latest-8-core
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install AI Tools (CPU Version)
        run: |
          # We force CPU versions to avoid the 5GB CUDA download you hit earlier
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torchao executorch llama-models huggingface_hub

      - name: Bake the 4096-Token Brain
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Download Llama 3.2 1B
          huggingface-cli download meta-llama/Llama-3.2-1B-Instruct \
            --token $HF_TOKEN \
            --local-dir model_dir
          
          # 2. Export to .pte
          # Fixed the module path to the standard 2026 executorch llm export tool
          python -m executorch.extension.llm.export.export_lib \
            --model_type llama3_2 \
            --checkpoint model_dir/model.safetensors \
            --params model_dir/config.json \
            --max_seq_length 4096 \
            --quantize_kv_cache int4 \
            --output_name llama_brain_4096.pte

      - name: Upload Final Brain
        uses: actions/upload-artifact@v4
        with:
          name: Llama-4096-PTE
          path: llama_brain_4096.pte
