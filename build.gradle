// --- THE TOOLS ---
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Updated to 8.2.0 to handle Java 17/21 (Major Version 65)
        classpath 'com.android.tools.build:gradle:8.2.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://maven.google.com" }
    }
}

apply plugin: 'com.android.application'

// --- THE APP BRAIN ---
android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    // Optimization: Don't compress the brain file! 
    aaptOptions {
        noCompress "litertlm", "tflite"
    }

    sourceSets {
        main {
            manifest.srcFile 'src/main/AndroidManifest.xml'
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
            assets.srcDirs = ['src/main/assets'] 
        }
    }
} // <--- THIS is the "Main Exit" for the android block. 

// --- THE LIBRARIES ---
dependencies {
    implementation("com.google.ai.edge.litertlm:litertlm-android:0.9.0-beta")
}
