plugins {
    id 'com.android.application' version '8.2.2'
    id 'org.jetbrains.kotlin.android' version '1.9.22'
}

android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        
        externalNativeBuild {
            cmake {
                abiFilters "arm64-v8a"
                arguments "-DANDROID_STL=c++_shared"
            }
        }

        def rawBuildNum = project.hasProperty('buildNumber') ? project.getProperty('buildNumber') : "1"
        def buildInt = rawBuildNum.toInteger()
        
        versionCode buildInt
        versionName "1.1.${buildInt}-alpha"
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version "3.22.1+"
        }
    }

    buildFeatures {
        buildConfig = true
        prefab = true 
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = "21"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    aaptOptions {
        noCompress "litert", "tflite"
    }
}

dependencies {
    // LiteRT 2.1.0 Stable Engine
    implementation 'com.google.ai.edge.litert:litert:2.1.0'
    implementation 'com.google.ai.edge.litert:litert-api:2.1.0'
    implementation 'com.google.ai.edge.litert:litert-gpu:2.1.0'
    
    // UI & Core
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
