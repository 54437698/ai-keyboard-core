package com.jv.ai_keyboard;

import android.content.Context;
import com.facebook.soloader.SoLoader;
import org.pytorch.executorch.LlamaModule;

/**
 * Sovereign: The Llama 3.2 1B Engine for Snapdragon 8 Elite.
 * This class handles the native bridge to ExecuTorch.
 */
public class JvNativeEngine {
    private LlamaModule llamaModule;

    /**
     * Wakes up the Llama brain. 
     * Matches the call: npuEngine.initialize(this) in JointVentureInputService.
     */
    public void initialize(Context context) {
        try {
            // 1. Initialize the native loader (Critical for ExecuTorch)
            SoLoader.init(context, false);

            // 2. Define the paths for the model and tokenizer
            // Ensure your Workflow downloads these specific filenames
            String modelPath = context.getFilesDir().getAbsolutePath() + "/models/model.pte";
            String tokenizerPath = context.getFilesDir().getAbsolutePath() + "/models/tokenizer.bin";

            // 3. Load the module (0.7f temperature for natural typing flow)
            llamaModule = new LlamaModule(modelPath, tokenizerPath, 0.7f);
            
            System.out.println("Sovereign: Llama 3.2 is online via ExecuTorch.");

        } catch (Exception e) {
            System.err.println("Sovereign Error: NPU/ExecuTorch initialization failed.");
            e.printStackTrace();
        }
    }

    /**
     * Predicts the next word for the keyboard bar.
     * Matches the call: npuEngine.getPrediction(inputContext) in JointVentureInputService.
     */
    public String getPrediction(String prompt) {
        if (llamaModule == null) {
            return "";
        }
        try {
            // ExecuTorch handles the generation loop internally
            return llamaModule.generate(prompt);
        } catch (Exception e) {
            e.printStackTrace();
            return "";
        }
    }

    /**
     * Clean up memory when the keyboard is hidden.
     */
    public void close() {
        if (llamaModule != null) {
            llamaModule.stop();
            llamaModule = null;
        }
    }
}
