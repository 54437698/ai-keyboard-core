buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // This stays here - it's the tool that builds the app
        classpath 'com.android.tools.build:gradle:8.1.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // This is the "Secret Sauce" repository for LiteRT
        maven { url "https://maven.google.com" }
    }
}

apply plugin: 'com.android.application'

android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34 // Bumped to 34 for Android 14/15 compatibility

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // This tells the S25 Ultra which NPU "languages" we speak
        ndk {
            abiFilters 'arm64-v8a' 
        }
    }

    // Optimization: Don't compress the brain file! 
    // If it's compressed, the NPU can't read it fast.
    aaptOptions {
        noCompress "litertlm", "tflite"
    }

    sourceSets {
        main {
            manifest.srcFile 'src/main/AndroidManifest.xml'
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
            // Make sure your brain file goes here!
            assets.srcDirs = ['src/main/assets'] 
        }
    }
}

// THIS is where the AI library actually lives
dependencies {
    implementation("com.google.ai.edge.litertlm:litertlm-android:0.9.0-beta")
}
