plugins {
    id 'com.android.application' version '8.2.2'
    id 'org.jetbrains.kotlin.android' version '1.9.22'
}

android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        
        // --- ALPHA VERSIONING LOGIC START ---
        def rawBuildNum = project.hasProperty('buildNumber') ? project.getProperty('buildNumber') : "1"
        def buildInt = rawBuildNum.toInteger()
        def finalCode = buildInt > 0 ? buildInt : 1
        
        versionCode finalCode
        versionName "1.1.${finalCode}-alpha"

        buildConfigField "String", "BUILD_VERSION", "\"1.1.${finalCode}-alpha\""
        // --- ALPHA VERSIONING LOGIC END ---
    }

    // --- RENAME OUTPUT APK START ---
    applicationVariants.all { variant ->
        variant.outputs.all {
            // Uses that finalCode variable to name the file
            outputFileName = "Sovereign-v${defaultConfig.versionCode}-${variant.name}.apk"
        }
    }
    // --- RENAME OUTPUT APK END ---

    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = "21"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }

    aaptOptions {
        noCompress "litertlm", "tflite"
    }

    sourceSets {
        main {
            manifest.srcFile 'src/main/AndroidManifest.xml'
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
            assets.srcDirs = ['src/main/assets'] 
        }
    }
}
