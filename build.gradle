plugins {
    id 'com.android.application' version '8.2.2'
    id 'org.jetbrains.kotlin.android' version '1.9.22'
}

android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        
        externalNativeBuild {
            cmake {
                abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
                // This tells CMake to look for the Prefab packages
                arguments "-DANDROID_STL=c++_shared"
            }
        }

        def rawBuildNum = project.hasProperty('buildNumber') ? project.getProperty('buildNumber') : "1"
        def buildInt = rawBuildNum.toInteger()
        def finalCode = buildInt > 0 ? buildInt : 1
        
        versionCode finalCode
        versionName "1.1.${finalCode}-alpha"
        buildConfigField "String", "BUILD_VERSION", "\"1.1.${finalCode}-alpha\""
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version "3.22.1+"
        }
    }

    buildFeatures {
        buildConfig = true
        prefab = true 
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = "21"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }

    aaptOptions {
        noCompress "litertlm", "tflite"
    }
}

dependencies {
    // The "Engine" (The 19MB Muscle)
    implementation 'com.google.ai.edge:litert:1.0.1'
    implementation 'com.google.ai.edge:litert-api:1.0.1'
    
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
}
