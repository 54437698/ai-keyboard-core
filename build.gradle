android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    // UPDATED: Syncing the app to Java 21 (Major Version 65)
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    // If you use Kotlin (highly recommended for LiteRT-LM), this keeps it synced
    kotlinOptions {
        jvmTarget = "21"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    aaptOptions {
        noCompress "litertlm", "tflite"
    }

    sourceSets {
        main {
            manifest.srcFile 'src/main/AndroidManifest.xml'
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
            assets.srcDirs = ['src/main/assets'] 
        }
    }
}
