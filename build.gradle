// 1. THE PLUGINS (The "Tools" must come first)
plugins {
    id 'com.android.application' version '8.2.0' apply true
    // If you plan on using Kotlin for the AI logic:
    id 'org.jetbrains.kotlin.android' version '1.9.22' apply true
}

// 2. THE APP CONFIGURATION
android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = "21"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    aaptOptions {
        noCompress "litertlm", "tflite"
    }

    sourceSets {
        main {
            manifest.srcFile 'src/main/AndroidManifest.xml'
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
            assets.srcDirs = ['src/main/assets'] 
        }
    }
}

// 3. THE REPOSITORIES
repositories {
    google()
    mavenCentral()
}

// 4. THE LIBRARIES
dependencies {
    implementation("com.google.ai.edge.litertlm:litertlm-android:0.9.0-beta")
}
