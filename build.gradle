plugins {
    id 'com.android.application' version '8.2.2'
    id 'org.jetbrains.kotlin.android' version '1.9.22'
}

android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        
        // --- ALPHA VERSIONING LOGIC START ---
        // Catch the number from GitHub YAML (-PbuildNumber)
        def buildNum = project.hasProperty('buildNumber') ? project.getProperty('buildNumber') : "0"
        
        versionCode buildNum.toInteger()
        versionName "1.1.${buildNum}-alpha"

        // This creates the constant for your Java code
        buildConfigField "String", "BUILD_VERSION", "\"1.1.${buildNum}-alpha\""
        // --- ALPHA VERSIONING LOGIC END ---
    }

    // Required to make the BUILD_VERSION accessible in Java
    buildFeatures {
        buildConfig = true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = "21"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        resources {
            excludes += '/META-INF/{AL2.0,LGPL2.1}'
        }
    }

    aaptOptions {
        noCompress "litertlm", "tflite"
    }

    sourceSets {
        main {
            manifest.srcFile 'src/main/AndroidManifest.xml'
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
            assets.srcDirs = ['src/main/assets'] 
        }
    }
}

dependencies {
    implementation("com.google.ai.edge.litertlm:litertlm-android:0.9.0-beta")
}
