plugins {
    id 'com.android.application' version '8.2.2'
    id 'org.jetbrains.kotlin.android' version '1.9.22'
}

android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        
        externalNativeBuild {
            cmake {
                abiFilters "arm64-v8a"
                arguments "-DANDROID_STL=c++_shared"
            }
        }

        // Handles the build number for Run #210
        def rawBuildNum = project.hasProperty('buildNumber') ? project.getProperty('buildNumber') : "210"
        def buildInt = rawBuildNum.toInteger()
        
        versionCode buildInt
        versionName "1.1.${buildInt}-alpha"
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version "3.22.1+"
        }
    }

    buildFeatures {
        buildConfig = true
        prefab = true 
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    aaptOptions {
        noCompress "litert", "tflite"
    }
}

dependencies {
    // Core ExecuTorch Runtime
    implementation 'org.pytorch:executorch-android:1.1.0' 
    
    // Facebook's JNI glue (Required for ExecuTorch)
    implementation 'com.facebook.soloader:soloader:0.10.5'
    implementation 'com.facebook.fbjni:fbjni:0.7.0'
}
