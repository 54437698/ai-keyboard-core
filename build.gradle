plugins {
    id 'com.android.application' version '8.2.2'
    id 'org.jetbrains.kotlin.android' version '1.9.22'
}

android {
    namespace 'com.jv.ai_keyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.jv.ai_keyboard"
        minSdk 24
        targetSdk 34
        
        // Removed C++ abiFilters and arguments - we are 100% Java/Kotlin now
        
        def rawBuildNum = project.hasProperty('buildNumber') ? project.getProperty('buildNumber') : "210"
        def buildInt = rawBuildNum.toInteger()
        
        versionCode buildInt
        versionName "1.1.${buildInt}-alpha"
    }

    // CRITICAL: We deleted the entire externalNativeBuild { cmake { ... } } block here.
    // This stops the compiler from looking for "litert" or running any C++ scripts.

    buildFeatures {
        buildConfig = true
        // prefab = true // No longer needed without C++
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
    }

    aaptOptions {
        noCompress "pte", "bin"
    }
}

repositories {
    google()
    mavenCentral() // Fix: Added 'maven' prefix
    maven { url 'https://download.pytorch.org/maven' }
}

dependencies {
    // The Stable Java-only path
    implementation 'org.pytorch:pytorch_android:2.1.0'
    implementation 'org.pytorch:pytorch_android_torchvision:2.1.0'
    
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
