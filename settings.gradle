        google()
        mavenCentral()
        // FIX: The official PyTorch stable repository
        maven { url 'https://oss.sonatype.org/content/repositories/snapshots' }
        maven { url 'https://download.pytorch.org/maven' }
    }
}

rootProject.name = "ai-keyboard-core"
include ':app'
